#
# R. Demers 2026.
#
server:
  shutdown: graceful
  port: 8080
#
management:
  server:
    port: 8081
  endpoints:
    web:
      exposure:
        include: "info,health,prometheus"
  prometheus:
    metrics:
      export:
        enabled: true
#
spring:
  main:
    cloud-platform: kubernetes
#
  lifecycle:
    timeout-per-shutdown-phase: 45s
#
  datasource:
    url: jdbc:hsqldb:mem:stagingdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.hsqldb.jdbc.JDBCDriver
    username: sa
    password:
#
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      # data-locations: classpath:data.sql   # optional
#
  jpa:
    # database-platform: org.hibernate.dialect.HSQLDialect
    open-in-view: false
    show-sql: true
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: none
#
org:
  rd:
    fullstack:
      springbootnuxt:
        secret: the.beautiful.secret.key.to.change
        expiration: 60000
        authorities: rd.roles
        kafka:
          sandbox:
            enabled: true
            clusters: 1
            cluster-partitions: 100
            concurrency: 10
        flink:
          sandbox:
            enabled: true
            rest-port: 0
            job-manager-port: 0
            task-manager-rpc-port: ""
            num-task-managers: 4
            num-slots-per-task-manager: 4
            active-metrics: false
#
logging:
  file:
    name: log/springboot-nuxt.log
  structured:
    format:
      console: ecs
    ecs:
      service:
        name: org.rd.fullstack.springboot-nuxt
        version: unspecified
        environment: DEV
        node-name: DEV
#